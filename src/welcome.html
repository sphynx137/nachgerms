<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NachGerms</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 264px;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 14px;
      user-select: none;
      padding: 14px;
    }

    .card {
      border: 1px solid #fff;
      border-radius: 7px;
      padding: 17px 17px 12px;
      position: relative;
    }

    .ge-icon {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 43px;
      height: 43px;
      object-fit: contain;
    }

    .ge-title {
      font-family: 'Pacifico', cursive;
      font-size: 22px;
      font-weight: 400;
      color: #fff;
      margin-bottom: 12px;
      display: block;
    }

    .ge-text {
      font-size: 12px;
      font-weight: 400;
      line-height: 1.65;
      color: #fff;
      margin-bottom: 14px;
    }

    .ge-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #333;
      padding-top: 10px;
    }
    .ge-compat { font-size: 11px; color: #aaa; }
    .ge-ghlink { font-size: 11px; color: #aaa; text-decoration: none; }
    .ge-ghlink:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <img class="ge-icon" src="../images/icons/icon-48.png" alt="">
    <span class="ge-title">Nach☆</span>
    <div class="ge-text">Thanks for installing NachGerms! Start customizing the game.</div>
    <div class="ge-footer">
      <span class="ge-compat">✓ Compatible with Germsfox</span>
      <a class="ge-ghlink" href="https://github.com/sphynx137/nachgerms" target="_blank">GitHub ↗</a>
    </div>
  </div>
</body>
</html>
